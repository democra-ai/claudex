<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>Claudex — 小红书海报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300..900;1,300..900&family=Geist:wght@100..900&family=JetBrains+Mono:wght@100..800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #f5f4ee; }
  body {
    width: 1080px; height: 1440px;
    font-family: 'Geist', -apple-system, "PingFang SC", "Hiragino Sans GB", system-ui;
    color: #3d3929;
    -webkit-font-smoothing: antialiased;
    text-rendering: geometricPrecision;
    overflow: hidden;
    position: relative;
  }

  /* Tri-accent wash: copper (Claude) bottom-left, indigo (Codex) top-right,
     a faint green (Share) center — the three tab colors as negative space. */
  body::before {
    content: '';
    position: absolute; inset: 0;
    background:
      radial-gradient(circle at 18% 82%, rgba(201,100,66,0.10) 0, transparent 42%),
      radial-gradient(circle at 84% 16%, rgba(67,102,242,0.09) 0, transparent 42%),
      radial-gradient(circle at 50% 52%, rgba(47,158,99,0.05) 0, transparent 55%);
    pointer-events: none;
  }

  /* Two ghosted rounded-square silhouettes — the "multiple accounts" idea,
     one copper, one indigo, told in negative space. */
  .ghost {
    position: absolute;
    width: 360px; height: 360px;
    border-radius: 78px;
    pointer-events: none;
  }
  .ghost.one { top: -120px; right: -120px; background: #4366F2; opacity: 0.07; transform: rotate(8deg); }
  .ghost.two { bottom: -100px; left: -110px; background: #c96442; opacity: 0.07; transform: rotate(-12deg); }

  .frame {
    position: relative; z-index: 1; height: 100%;
    display: flex; flex-direction: column; align-items: center;
    padding: 150px 80px 96px;
  }

  .logo {
    width: 264px; height: 264px;
    margin-bottom: 40px;
    filter: drop-shadow(0 24px 48px rgba(61,57,41,0.18)) drop-shadow(0 4px 12px rgba(61,57,41,0.08));
  }

  /* Three accent dots — Claude · Codex · Share. The Share dot glows green. */
  .accents { display: flex; gap: 26px; align-items: center; margin-bottom: 54px; }
  .dot { width: 18px; height: 18px; border-radius: 50%; }
  .dot.claude { background: #c96442; }
  .dot.codex  { background: #4366F2; }
  .dot.share  { background: #2f9e63; box-shadow: 0 0 0 4px rgba(47,158,99,0.16), 0 0 16px 3px rgba(47,158,99,0.55); }
  .accents .lbl {
    font-family: "JetBrains Mono", monospace; font-size: 15px;
    letter-spacing: 0.18em; text-transform: uppercase; color: rgba(131,120,107,0.7);
    margin-left: 6px;
  }

  .headline {
    font-family: "PingFang SC", "Hiragino Sans GB", -apple-system, system-ui;
    font-size: 78px; font-weight: 600; line-height: 1.24;
    text-align: center; letter-spacing: -0.01em; color: #3d3929;
    margin-bottom: 16px;
  }
  .headline .c-claude { color: #c96442; }
  .headline .c-codex  { color: #4366F2; }
  .headline .ellipsis { color: #2f9e63; font-family: "Fraunces", Georgia, serif; font-style: italic; font-weight: 400; }

  .divider { width: 56px; height: 2px; background: #c96442; opacity: 0.55; margin: 46px 0 34px; }

  .brand {
    font-family: "Fraunces", "Iowan Old Style", Georgia, serif;
    font-style: italic; font-weight: 500; font-size: 66px;
    color: #c96442; letter-spacing: -0.015em; line-height: 1; margin-bottom: 22px;
  }
  /* "Claudex" = Claude + Codex — the "Claud" reads in Claude copper, the
     "ex" (the -ex of Codex) in Codex indigo, so the wordmark itself is the blend. */
  .brand .codex { color: #4366F2; }

  .subtitle {
    font-family: "PingFang SC", -apple-system, system-ui;
    font-size: 25px; font-weight: 400; color: #83786b;
    letter-spacing: 0.05em; text-align: center; line-height: 1.7;
  }
  .subtitle .emphasis { color: #3d3929; font-weight: 500; }
  .subtitle .green { color: #2f9e63; font-weight: 500; }

  .footer { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .footer .url { font-family: "JetBrains Mono", monospace; font-size: 20px; color: #83786b; letter-spacing: 0.04em; }
  .footer .tag {
    font-family: "Geist", sans-serif; font-size: 12px; color: rgba(131,120,107,0.5);
    letter-spacing: 0.32em; text-transform: uppercase; margin-top: 6px;
  }
</style>
</head>
<body>
  <div class="ghost one"></div>
  <div class="ghost two"></div>

  <div class="frame">
    <img class="logo" src="../../src-tauri/icons/icon.png" alt="Claudex">

    <div class="accents">
      <span class="dot claude"></span>
      <span class="dot codex"></span>
      <span class="dot share"></span>
      <span class="lbl">Claude · Codex · Share</span>
    </div>

    <div class="headline">
      <span class="c-claude">Claude</span> 和 <span class="c-codex">Codex</span><br>
      多账号,一台 Mac<span class="ellipsis">。</span>
    </div>

    <div class="divider"></div>

    <div class="brand">Claud<span class="codex">ex</span></div>
    <div class="subtitle">
      每个账号完全隔离,各自独立登录<br>
      Skills · MCP · 记忆 · 会话<br>
      <span class="green">同平台 / 跨平台 自由共享</span>
    </div>

    <div class="footer">
      <div class="url">github.com/democra-ai/claudex</div>
      <div class="tag">open source · macOS · free</div>
    </div>
  </div>
</body>
</html>
